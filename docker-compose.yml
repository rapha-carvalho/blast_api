services:
  api:
    image: ${API_IMAGE:-ghcr.io/rapha-carvalho/blast_api:latest}
    container_name: ga4-inspector-api
    environment:
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      MAX_BODY_MB: ${MAX_BODY_MB:-5}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-20}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      ENABLE_DB: ${ENABLE_DB:-false}
      DB_PATH: ${DB_PATH:-/app/data/ga4-inspector.db}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://blastgroup.org,https://education.blastgroup.org}
      ALLOW_CHROME_EXTENSION_ORIGINS: ${ALLOW_CHROME_EXTENSION_ORIGINS:-true}
      ALLOWED_EXTENSION_IDS: ${ALLOWED_EXTENSION_IDS:-}
      LOGO_PATH: ${LOGO_PATH:-/app/blast-logo.png}

      TRACKING_SHARED_TOKEN: ${TRACKING_SHARED_TOKEN}
      TRACKING_RATE_LIMIT_MAX: ${TRACKING_RATE_LIMIT_MAX:-120}
      TRACKING_RATE_LIMIT_WINDOW_MS: ${TRACKING_RATE_LIMIT_WINDOW_MS:-60000}
      TRACKING_IDEMPOTENCY_TTL_MS: ${TRACKING_IDEMPOTENCY_TTL_MS:-604800000}
      TRACKING_DISPATCH_TIMEOUT_MS: ${TRACKING_DISPATCH_TIMEOUT_MS:-5000}
      TRACKING_DEBUG_ENABLED: ${TRACKING_DEBUG_ENABLED:-false}

      META_PIXEL_ID: ${META_PIXEL_ID}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}

      GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID}
      GA4_API_SECRET: ${GA4_API_SECRET}

      MENTORSHIP_API_TOKEN: ${MENTORSHIP_API_TOKEN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_MENTORSHIP: ${STRIPE_PRICE_ID_MENTORSHIP:-}
      STRIPE_PRICE_ID_MONTHLY: ${STRIPE_PRICE_ID_MONTHLY:-}
      STRIPE_PRICE_ID_YEARLY: ${STRIPE_PRICE_ID_YEARLY:-}
      STRIPE_PRICE_ID_ONETIME: ${STRIPE_PRICE_ID_ONETIME:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@blastgroup.org}
      CONTACT_INBOX: ${CONTACT_INBOX:-contato@blastgroup.org}
      MENTORSHIP_WAITLIST_SPREADSHEET_ID: ${MENTORSHIP_WAITLIST_SPREADSHEET_ID:-1t-5si3mrSK81yBYOeuvKlraKTAuzv2BRj-L1jiQODeM}
      MENTORSHIP_WAITLIST_SHEET_NAME: ${MENTORSHIP_WAITLIST_SHEET_NAME:-Inscricoes}
      MENTORSHIP_WAITLIST_NOTIFY_TO: ${MENTORSHIP_WAITLIST_NOTIFY_TO:-raphael.carvalho@blastgroup.org}
      SITE_URL: ${SITE_URL:-https://blastgroup.org}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      GOOGLE_SHEETS_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SHEETS_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_SHEETS_PRIVATE_KEY: ${GOOGLE_SHEETS_PRIVATE_KEY:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}

    volumes:
      - ga4_inspector_data:/app/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ga4-inspector-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ga4_inspector_data:
