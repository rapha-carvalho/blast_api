services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ga4-inspector-api-local
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      MAX_BODY_MB: 5
      RATE_LIMIT_MAX: 20
      RATE_LIMIT_WINDOW_MS: 60000
      ENABLE_DB: "false"
      DB_PATH: /app/data/ga4-inspector.db
      ALLOWED_ORIGINS: https://blastgroup.org,https://www.blastgroup.org,https://education.blastgroup.org
      ALLOW_CHROME_EXTENSION_ORIGINS: "true"
      LOGO_PATH: /app/blast-logo.png
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      NEWSLETTER_SPREADSHEET_ID: ${NEWSLETTER_SPREADSHEET_ID:-1pYUecE7dinPywyabPNhqamya2nhx2zl-HioJFRAms4c}
      NEWSLETTER_SUBSCRIBERS_SHEET_NAME: ${NEWSLETTER_SUBSCRIBERS_SHEET_NAME:-Inscritos}
      NEWSLETTER_EVENTS_SHEET_NAME: ${NEWSLETTER_EVENTS_SHEET_NAME:-Eventos}
      NEWSLETTER_EMAIL_EVENTS_SHEET_NAME: ${NEWSLETTER_EMAIL_EVENTS_SHEET_NAME:-Email Eventos}
      NEWSLETTER_EMAIL_SUMMARY_SHEET_NAME: ${NEWSLETTER_EMAIL_SUMMARY_SHEET_NAME:-Resumo por Email}
      NEWSLETTER_CAMPAIGN_SUMMARY_SHEET_NAME: ${NEWSLETTER_CAMPAIGN_SUMMARY_SHEET_NAME:-Resumo por Campanha}
      TRACKING_ALLOWED_HOSTNAMES: blastgroup.org,www.blastgroup.org,education.blastgroup.org
      TRACKING_GA4_VALIDATE_EVENTS: "false"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
